name: Build Kasir Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (Android/Gradle toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      # Produces an unsigned debug APK you can install directly for testing.
      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kasir-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # ------------------------------------------------------------------
      # Optional: signed release build. Only runs if signing secrets exist.
      # Add these repo secrets to enable it:
      #   ANDROID_KEYSTORE_BASE64   (base64 of your .jks/.keystore file)
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_ALIAS
      #   ANDROID_KEY_PASSWORD
      # ------------------------------------------------------------------
      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Assemble release APK (signed)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: kasir-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
